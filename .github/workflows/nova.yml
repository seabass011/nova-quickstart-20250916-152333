name: Nova Demo CI (Stub)

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install -U pip
          pip install pytest pytest-json-report

      - name: Run tests (stubbed)
        continue-on-error: true
        run: |
          echo "Nova stub mode: provide CLOUDSMITH_ENTITLEMENT to enable real runs."
          set +e
          pytest -v || true
          set -e

      - name: Upload artifacts (stub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nova-ci-stub
          path: |
            test-results.json
          if-no-files-found: ignore
